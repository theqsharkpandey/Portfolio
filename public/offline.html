<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline | Kushagra Portfolio</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #050505;
        color: #fff;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        max-width: 540px;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        text-align: center;
      }
      a {
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Looks like your internet connection took a coffee break ☕. Please
        reconnect and refresh.
      </p>
      <p><a href="/">Try again</a></p>
    </div>
  </body>
</html>
